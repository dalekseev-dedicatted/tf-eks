name: CI - GitHub Runners

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    # needs: [fastapi_app_test]

    permissions:
      id-token: write   # This is required for requesting the JWT
      contents: read    # This is required for actions/checkout


    steps:

    - name: Check out code
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Build
      working-directory: ./app
      run: go build -o server .

    - name: Test
      working-directory: ./app
      run: go test -v ./...

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        # aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        # aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        role-to-assume: arn:aws:iam::056629602131:role/GitHubActionsRole
        aws-region: eu-central-1

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build image and tag to Amazon ECR
      run: |
        docker build -t  056629602131.dkr.ecr.us-east-1.amazonaws.com/repo:image_tag .

    - name: push image to Amazon ECR
      run: |
         docker push  056629602131.dkr.ecr.us-east-1.amazonaws.com/image_tag:latest
