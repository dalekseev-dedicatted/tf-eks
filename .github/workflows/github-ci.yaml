name: CI - GitHub Runners

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: 056629602131.dkr.ecr.us-east-1.amazonaws.com
  IMAGE_NAME: my-app-repo  #${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    # needs: [fastapi_app_test]

    permissions:
      id-token: write   # This is required for requesting the JWT
      contents: read    # This is required for actions/checkout


    steps:

    - name: Check out code
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Build
      working-directory: ./app
      run: go build -o server .

    - name: Test
      working-directory: ./app
      run: go test -v ./...

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::056629602131:role/GitHubActionsRole
        aws-region: us-east-1

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=sha,prefix=github-
          type=raw,value=github-latest

    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: ./app
        platforms: linux/amd64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
